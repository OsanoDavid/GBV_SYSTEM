{% extends 'base.html' %}

{% block title %}Update Status | SafeSpace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-3xl shadow-xl p-8 text-center border border-violet-100">
        <h2 class="text-xl font-black text-violet-900 mb-4">Confirm Status Update</h2>
        <p class="text-gray-600 mb-6">Updating case: <strong>{{ report.reference_number }}</strong></p>
        
        <form method="POST">
            {% csrf_token %}
            <select name="status" class="w-full p-3 border border-gray-300 rounded-xl mb-6">
                <option value="new" {% if report.status == 'new' %}selected{% endif %}>New</option>
                <option value="in_progress" {% if report.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                <option value="action_taken" {% if report.status == 'action_taken' %}selected{% endif %}>Resolved</option>
            </select>
            
            <div class="flex gap-3">
                <button type="submit" class="flex-1 bg-violet-600 text-white font-bold py-3 rounded-xl hover:bg-violet-700">Save Update</button>
                <a href="{% url 'department_portal' %}" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
