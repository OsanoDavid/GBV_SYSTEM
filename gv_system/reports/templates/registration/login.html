{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-2xl shadow-xl border border-violet-100 p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-velvet-900">Log In to SafeSpace</h1>
            <p class="text-xs text-gray-500 mt-1">Access your secure case records management dashboard.</p>
        </div>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="p-3 bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg font-semibold">
                    {{ form.non_field_errors.as_text }}
                </div>
            {% endif %}
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Username</label>
                <input type="text" name="username" required class="w-full p-3 bg-gray-50 border border-violet-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-600 text-sm">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required class="w-full p-3 bg-gray-50 border border-violet-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-600 text-sm">
            </div>
            
            <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg shadow transition">
                Secure Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
